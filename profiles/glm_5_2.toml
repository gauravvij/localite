[model]
name = "z-ai/glm-5.2"
provider = "openai_compatible"
base_url = "https://openrouter.ai/api/v1"
timeout = 600
num_predict = 8192
has_thinking_tags = false
tool_call_format = "standard"
max_context_chars = 400000
max_turns = 60

[agent]
format_guard = false
stall_threshold = 4
memory_horizon = 20
max_context_window = 1048576
# reasoning_exclude: when True, suppresses reasoning/thinking tokens via OpenRouter API
# Set to false to allow GLM 5.2 to use its native chain-of-thought reasoning
reasoning_exclude = false